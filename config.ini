; ============================================================
; OneSync 配置文件 (config.ini)
; 编码: UTF-8 (无BOM)
;
; 使用说明:
;   1. 在 [app] 中设置 active_mode 指定当前使用的同步模式
;   2. 每个同步模式一个段落，如 [Wajima]、[qiniu]
;   3. 全局配置按功能分组: [log] [ui] [sync] [transfer] 等
;   4. 修改后无需重启，下次同步扫描时自动生效
;   5. 值为空表示使用内置默认值
; ============================================================

[app]
version = 1.0.0                          ; 应用版本号（仅用于显示和兼容性检查）
active_mode = qiniu                     ; 当前激活的同步模式，必须与下方某个模式组名匹配
auto_start = false                       ; 是否开机自启
provider_id = OneSync                    ; 同步根提供者标识（注册到 Windows Cloud Files API）
account_id = OneSync              ; 账户标识（用于区分不同账户的同步根）

[log]
level = debug                            ; 日志级别: trace/debug/info/warn/error (不区分大小写)
max_files = 10                           ; 最大保留日志文件数，超出后自动轮转删除最旧的
log_dir =                                ; 全局日志目录（留空使用exe同目录/logs）

[ui]
show_console = true                      ; 是否显示控制台窗口（调试时建议开启）
show_ui = true                           ; 是否显示系统托盘图标和进度窗口
display_name = OneSync                   ; 在资源管理器中显示的同步根名称
refresh_interval_ms = 1000               ; UI刷新间隔(毫秒)，进度窗口和状态更新频率
recent_transfers_max = 100               ; 最近传输记录保留上限（超出后自动淘汰最旧的）
speed_samples = 10                       ; 速度计算采样点数（越多越平滑但响应越慢）

[sync]
interval_ms = 100                        ; 本地变更检测间隔(毫秒)，越小越灵敏但CPU占用越高
remote_scan_interval_s = 30              ; 远程服务端扫描间隔(秒)，拉取远端变更列表
upload_check_interval_s = 1              ; 上传完成检查间隔(秒)，确认文件是否已上传成功
pin_check_interval_s = 3                 ; 占位符钉住状态检查间隔(秒)
rename_max_retries = 3                   ; 文件重命名最大重试次数（被占用时等待重试）
auto_start = false                       ; 同步引擎是否随应用启动自动开始
max_file_size_mb = 0                     ; 单文件大小上限(MB)，0=不限
exclude_patterns =                       ; 排除文件模式（逗号分隔），如 *.tmp,*.bak,thumbs.db
register_settle_ms = 1000                ; 注册同步根后的稳定等待时间(毫秒)

[transfer]
max_retries = 3                          ; 网络请求最大重试次数
retry_delay_ms = 500                     ; 重试之间的初始延迟(毫秒)
chunk_size = 4096                        ; 分块上传/下载的块大小(KB)
chunk_delay_ms = 100                     ; 分块传输之间的延迟(毫秒)，防止服务器限流
small_file_threshold_mb = 10             ; 小文件阈值(MB)，小于此值不分块直接上传
download_chunk_size_mb = 4               ; 下载分块大小(MB)，用于大文件断点续传
max_redirects = 3                        ; HTTP重定向最大跟随次数
retry_policy = standard                  ; 重试策略: fast/standard/robust/conservative
                                         ;   fast       - 快速重试，适用于实时性要求高的场景
                                         ;   standard   - 标准重试，适用于一般文件操作（默认）
                                         ;   robust     - 健壮重试，适用于网络不稳定环境
                                         ;   conservative - 保守重试，适用于大文件传输
backoff_multiplier = 2.0                 ; 指数退避倍数（每次重试延迟=上一次*此值）
jitter_factor = 0.2                      ; 随机抖动因子(±比例)，防止多客户端同时重试造成惊群
max_retry_delay_ms = 30000               ; 单次重试最大延迟上限(毫秒)

[safety]
confirm_threshold = 2                    ; 连续删除多少个文件/目录后触发人工确认提示
cooldown_ms = 10000                      ; 确认冷却时间(毫秒)，防止短时间内重复弹窗
max_deletes_per_scan_file = 5            ; 单次扫描最多删除的文件数（防误删保护）
max_deletes_per_scan_dir = 3             ; 单次扫描最多删除的目录数
concurrent_deletes = 3                   ; 并发删除任务数上限
file_unlock_wait_seconds = 10            ; 等待文件解锁的最大超时时间(秒)
unlock_poll_ms = 500                     ; 文件解锁状态轮询间隔(毫秒)
delete_confirm_attempts = 10             ; 删除确认重试次数（等待文件从磁盘消失）
delete_confirm_poll_ms = 100             ; 删除确认轮询间隔(毫秒)，每次检查文件是否已消失

[upload]
backoff_max_seconds = 60                 ; 指数退避最大等待时间(秒)，上传失败时延迟递增的上限

[conflict]
max_sequence = 100                       ; 冲突副本序列号上限，超过后放弃生成副本
                                         ; 冲突文件命名: 文件名_冲突1.ext, 文件名_冲突2.ext ...

[hash]
save_mode = immediate                    ; 持久化策略:
                                         ;   immediate - 每次变更立即写磁盘（最安全，IO较多）
                                         ;   batch     - 攒够阈值或超时后批量写入
                                         ;   on_exit   - 仅退出时写入（最快，异常可能丢失数据）
hash_cache_dir =                         ; 全局哈希缓存目录（留空则放在exe同目录）
batch_save_interval_s = 30               ; batch模式下批量写入的超时时间(秒)
batch_save_threshold = 10                ; batch模式下攒够多少条变更才触发写入
read_buffer_kb = 64                      ; SHA-256哈希计算的读取缓冲区大小(KB)

